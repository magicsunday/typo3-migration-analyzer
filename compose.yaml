name: typo3-migration-analyzer

# Persistent volumes for data storage
volumes:
    # Stores the application files
    app:

services:
    # PHP-FPM service
    # Runs the Symfony application with all parsed RST documents and matcher configs
    phpfpm:
        build:
            context: .
            dockerfile: ./Dockerfile
            target: php-build
            args:
                PHP_VERSION: ${PHP_VERSION:-8.4}
        environment:
            - APP_ENV
            - APP_SECRET
            - DEFAULT_URI=${DEFAULT_URI:-http://localhost:${HTTP_PORT:-8080}}
        restart: unless-stopped
        volumes:
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
            - app:/var/www
        networks:
            - default

    # Nginx web server
    # Serves the web application and proxies PHP requests to PHP-FPM
    nginx:
        depends_on:
            - phpfpm
        image: nginx:stable-alpine
        environment:
            - ENFORCE_HTTPS
        restart: unless-stopped
        volumes:
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
            - app:/var/www:ro
            - ./rootfs/etc/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./rootfs/etc/nginx/includes/enforce-https.conf:/etc/nginx/includes/enforce-https.conf:ro
            - ./rootfs/etc/nginx/includes/security-headers-map.conf:/etc/nginx/includes/security-headers-map.conf:ro
            - ./rootfs/etc/nginx/includes/security-headers.conf:/etc/nginx/includes/security-headers.conf:ro
            - ./rootfs/etc/nginx/templates:/etc/nginx/templates:ro
        networks:
            - default

# Network configuration
networks:
    default:
