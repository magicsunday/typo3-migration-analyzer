include includes/security-headers-map.conf;

server {
    listen 80 default_server;
    listen [::]:80 default_server ipv6only=on;

    server_name _;

    root  /var/www/public;
    index index.php;

    charset utf-8;

    # Enforce call via https
    set $isHttps $https;

    if ($server_port = 443) {
        set $isHttps on;
    }

    if ($http_x_forwarded_proto = https) {
        set $isHttps on;
    }

    include includes/enforce-https.conf;
    include includes/security-headers.conf;

    # Enable long browser caching for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|eot)$ {
        etag on;
        expires 1y;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to sensitive directories
    location /vendor {
        deny all;
    }

    # Symfony front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM
    location ~ \.php {
        try_files $uri =404;

        include fastcgi_params;

        fastcgi_pass   phpfpm:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  HTTPS            $isHttps;
    }
}
