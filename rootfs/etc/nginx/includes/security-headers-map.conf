# The HTTP Referrer-Policy response header controls how much referrer information
# should be included with requests.
#
# https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Referrer-Policy
map $upstream_http_referrer_policy $referrer_policy {
    ""  "strict-origin-when-cross-origin";
}

# The HTTP Strict-Transport-Security response header informs browsers that the page
# should only be accessible via HTTPS.
#
# https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
map $upstream_http_strict_transport_security $sts_value {
    ""  "max-age=31536000; includeSubDomains";
}

# The HTTP X-Content-Type-Options response header indicates that the MIME types
# advertised in the Content-Type header should be respected and not changed.
#
# https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
map $upstream_http_x_content_type_options $cto_value {
    ""  "nosniff";
}

# https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
map $upstream_http_content_security_policy $csp_value {
    ""  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
}

map $HTTPS_ENFORCEMENT $csp_header_value {
    1        "$csp_value always";
    default  "";
}
